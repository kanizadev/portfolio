<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact – Kaniza</title>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Orbitron:wght@500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>

<body>
    <canvas id="matrix"></canvas>
    <div class="cursor-dot"></div>

    <header>
        <nav>
            <h1>kanizadev</h1>
            <div class="hamburger" id="hamburger">&#9776;</div>
            <ul id="navLinks">
                <li><a href="index.html">home</a></li>
                <li><a href="about.html">about</a></li>
                <li><a href="projects.html">projects</a></li>
                <li><a href="contact.html" class="active">contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="contact">
        <h2>contact</h2>
        <div class="contact-card">
            <p class="contact-intro">Have a project in mind or want to say hi? Drop me a message and I’ll get back to you.</p>
            <form id="contactForm" class="contact-form">
                <div class="form-row">
                    <label for="contactName" class="sr-only">Name</label>
                    <input type="text" id="contactName" name="from_name" placeholder="Name" required />
                    <label for="contactEmail" class="sr-only">Email</label>
                    <input type="email" id="contactEmail" name="from_email" placeholder="Email" required />
                </div>
                <div class="form-group">
                    <label for="contactMessage" class="sr-only">Message</label>
                    <textarea id="contactMessage" name="message" placeholder="Your message..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send message</button>
            </form>
            <p id="formResponse" class="form-response" aria-live="polite"></p>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 kanizadev &mdash; built with HTML, CSS &amp; JS</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
